services:
  convert-service:
    image: ghcr.io/fabianwimberger/archive-video-av1:latest
    container_name: convert-service
    restart: unless-stopped
    ports:
      - "8000:8000"
      # - "9988:9988/udp"
    volumes:
      - /path/to/your/videos:/videos
      - app-data:/app/data
    environment:
      - TZ=UTC
      - SOURCE_MOUNT=/videos
      - TEMP_DIR=/app/temp
      - DATABASE_PATH=/app/data/app.db
      - LOG_LEVEL=INFO
      - AUDIO_TRACK_MODE=preferred
      - SUBTITLE_TRACK_MODE=preferred
      - PREFERRED_AUDIO_LANGUAGES=ger,deu,de,eng,en
      - PREFERRED_SUBTITLE_LANGUAGES=ger,deu,de,eng,en
      # Enable on trusted LANs only. All nodes must mount videos at the same path.
      # - DISTRIBUTED_ENABLED=true
      # - DISTRIBUTED_NODE_ID=node-a
      # - DISTRIBUTED_NODE_NAME=Node A
      # - DISTRIBUTED_PUBLIC_URL=http://192.168.1.10:8000
      # Optional: pin one coordinator instead of automatic leader election.
      # - DISTRIBUTED_LEADER_URL=http://192.168.1.10:8000
      # - DISTRIBUTED_PEERS=http://192.168.1.11:8000,http://192.168.1.12:8000

volumes:
  app-data:
